<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA 스터디 플래너</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <h1 class="logo">SKALA 스터디 플래너</h1>
        <p class="today" id="today">2026년 7월 23일</p>
    </header>

    <main class="container">
        <section class="panel" aria-labelledby="form-title">
            <h2 id="form-title" class="panel-title">학습 목표 추가</h2>
            <form class="form" id="goal-form">
                <label class="sr-only" for="goal-input">학습 목표</label>
                <input class="form-input" id="goal-input" type="text" 
                        placeholder="오늘 공부할 내용을 입력하세요" required>
                <label class="sr-only" for="goal-category">분류</label>
                <select class="form-select" id="goal-category">
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JS">Javascript</option>
                </select>
                <button class="btn btn-primary" type="submit">추가</button>
            </form> 
            <p class="form-error" id="form-error" hidden>
                목표를 한 글자 이상 입력해 주세요.</p>
        </section>


    <script src="js/app.js"></script>
</body>
</html>
